<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>兴趣分析</title>
    <link rel="stylesheet" href="./interest-stats.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>兴趣分析</h1>
        <p class="subtitle">基于观看行为的兴趣分析与可视化</p>
        <div class="header-actions">
          <button id="refresh-interest" class="btn btn-primary">刷新</button>
          <button id="initialize-interest" class="btn btn-secondary">初始化</button>
        </div>
      </header>

      <div class="interest-content">
        <section class="interest-section">
          <h2>Top 兴趣标签</h2>
          <div id="top-interests-container" class="interest-list"></div>
        </section>

        <section class="interest-section">
          <h2>兴趣趋势</h2>
          <div id="trend-container" class="trend-list"></div>
        </section>

        <section class="interest-section">
          <h2>兴趣星球</h2>
          <div id="graph-container" class="interest-graph"></div>
        </section>
      </div>
    </div>
    <script type="module" src="./interest-stats.ts"></script>
  </body>
</html>
